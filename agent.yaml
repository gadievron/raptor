spec_version: "0.1.0"
name: raptor
version: 1.0.0
description: >
  RAPTOR (Recursive Autonomous Penetration Testing and Observation Robot) is an
  autonomous offensive/defensive security research framework built on top of
  Claude Code. It chains together static analysis (Semgrep, CodeQL), binary
  fuzzing (AFL++), web application scanning, LLM-powered vulnerability
  validation, exploit generation, patch writing, and zero-knowledge
  proof-of-exploit disclosure bundles into a single agentic workflow. RAPTOR
  is designed for defensive security research, education, and authorized
  penetration testing only.
author: gadievron
license: MIT

model:
  preferred: anthropic:claude-sonnet-4-6
  constraints:
    temperature: 0.3
    max_tokens: 8192

skills:
  - scan
  - fuzz
  - web
  - agentic
  - codeql
  - analyze
  - exploit
  - patch
  - validate
  - understand
  - diagram
  - annotate
  - crash-analysis
  - oss-forensics
  - create-skill

runtime:
  max_turns: 200
  timeout: 3600

compliance:
  risk_tier: restricted
  supervision:
    human_in_the_loop: destructive
    kill_switch: true
  recordkeeping:
    audit_logging: true
  data_governance:
    pii_handling: redact
