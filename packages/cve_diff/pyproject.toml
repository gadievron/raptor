[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "cve-diff"
version = "0.1.0"
description = "CVE patch analysis pipeline — discover, acquire, diff, and explain"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31",
    "typer>=0.12",
    "psutil>=5.9",
    "jinja2>=3.1",
    "anthropic>=0.34",
]

[project.scripts]
cve-diff = "cve_diff.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["cve_diff"]
