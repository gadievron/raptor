rules:
  # ---------------------------------------------------------------------------
  # Python — taint: web framework sources → HTTP client sinks
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.taint.python
    message: >-
      Untrusted data flows into an outbound HTTP request. Enforce a strict
      URL allowlist or use a proxy with egress controls.
    languages: [python]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Django
          - pattern: request.GET[...]
          - pattern: request.POST[...]
          - pattern: request.GET.get(...)
          - pattern: request.POST.get(...)
          - pattern: request.data[...]
          - pattern: request.query_params[...]
          # Flask
          - pattern: flask.request.args[...]
          - pattern: flask.request.args.get(...)
          - pattern: flask.request.form[...]
          - pattern: flask.request.form.get(...)
          - pattern: flask.request.json[...]
          - pattern: flask.request.get_json(...)
          # FastAPI / Starlette (function params are the source)
          - pattern: request.query_params[...]
          - pattern: request.path_params[...]
          # Generic
          - pattern: input(...)
          - pattern: os.environ[...]
          - pattern: os.environ.get(...)
          - pattern: sys.argv[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              # requests
              - pattern: requests.get($URL, ...)
              - pattern: requests.post($URL, ...)
              - pattern: requests.put($URL, ...)
              - pattern: requests.delete($URL, ...)
              - pattern: requests.patch($URL, ...)
              - pattern: requests.head($URL, ...)
              - pattern: requests.options($URL, ...)
              - pattern: requests.request($METHOD, $URL, ...)
              # urllib
              - pattern: urllib.request.urlopen($URL, ...)
              - pattern: urllib.request.Request($URL, ...)
              # httpx
              - pattern: httpx.get($URL, ...)
              - pattern: httpx.post($URL, ...)
              - pattern: httpx.put($URL, ...)
              - pattern: httpx.delete($URL, ...)
              - pattern: httpx.patch($URL, ...)
              - pattern: httpx.head($URL, ...)
              - pattern: httpx.options($URL, ...)
              - pattern: httpx.request($METHOD, $URL, ...)
              # Instance-method HTTP sinks (httpx.Client, aiohttp.ClientSession,
              # requests.Session, urllib3.PoolManager). $OBJ.get() collides
              # with dict.get() — LLM triage filters those. Source-expression
              # collisions (flask.request.args.get etc.) excluded below.
              - pattern: $CLIENT.get($URL, ...)
              - pattern: $CLIENT.post($URL, ...)
              - pattern: $CLIENT.put($URL, ...)
              - pattern: $CLIENT.delete($URL, ...)
              - pattern: $CLIENT.patch($URL, ...)
              - pattern: $CLIENT.head($URL, ...)
              - pattern: $CLIENT.options($URL, ...)
              - pattern: $CLIENT.request($METHOD, $URL, ...)
          # Exclude source expressions that collide with $CLIENT.get()
          - pattern-not: flask.request.args.get(...)
          - pattern-not: flask.request.form.get(...)
          - pattern-not: request.GET.get(...)
          - pattern-not: request.POST.get(...)
          - pattern-not: os.environ.get(...)
    metadata:
      cwe: ["CWE-918"]
      owasp_top_10: ["A10:2021-Server-Side Request Forgery"]
      tags: ["security", "ssrf", "taint"]

  # ---------------------------------------------------------------------------
  # Go — taint: net/http handler params → HTTP client sinks
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.taint.go
    message: >-
      Untrusted data flows into an outbound HTTP request. Enforce a strict
      URL allowlist or use a proxy with egress controls.
    languages: [go]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.URL.Query().Get(...)
          - pattern: $REQ.FormValue(...)
          - pattern: $REQ.PostFormValue(...)
          - pattern: $REQ.Header.Get(...)
          - pattern: $REQ.PathValue(...)
          # gin
          - pattern: $CTX.Query(...)
          - pattern: $CTX.Param(...)
          - pattern: $CTX.PostForm(...)
          # echo
          - pattern: $CTX.QueryParam(...)
          - pattern: $CTX.FormValue(...)
          # environment
          - pattern: os.Getenv(...)
          - pattern: os.Args[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: http.Get($URL)
              - pattern: http.Post($URL, ...)
              - pattern: http.PostForm($URL, ...)
              - pattern: http.Head($URL)
              - pattern: http.NewRequest($METHOD, $URL, ...)
              - pattern: http.NewRequestWithContext($CTX, $METHOD, $URL, ...)
              - pattern: $CLIENT.Get($URL)
              - pattern: $CLIENT.Post($URL, ...)
              - pattern: $CLIENT.PostForm($URL, ...)
              - pattern: $CLIENT.Head($URL)
              - pattern: $CLIENT.Do($REQ)
          # Exclude source expressions that collide with $CLIENT.Get()
          - pattern-not: $REQ.URL.Query().Get(...)
          - pattern-not: $REQ.Header.Get(...)
    metadata:
      cwe: ["CWE-918"]
      owasp_top_10: ["A10:2021-Server-Side Request Forgery"]
      tags: ["security", "ssrf", "taint"]

  # ---------------------------------------------------------------------------
  # Java — taint: servlet/Spring params → HTTP client sinks
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.taint.java
    message: >-
      Untrusted data flows into an outbound HTTP request. Enforce a strict
      URL allowlist or use a proxy with egress controls.
    languages: [java]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Servlet
          - pattern: (HttpServletRequest $REQ).getParameter(...)
          - pattern: (HttpServletRequest $REQ).getHeader(...)
          - pattern: (HttpServletRequest $REQ).getPathInfo()
          - pattern: (HttpServletRequest $REQ).getQueryString()
          - pattern: (HttpServletRequest $REQ).getRequestURI()
          # Spring MVC (annotated params are the real source, but semgrep
          # cannot match annotation-driven injection — these catch the
          # manual-extraction fallback)
          - pattern: (WebRequest $REQ).getParameter(...)
          - pattern: (WebRequest $REQ).getHeader(...)
    pattern-sinks:
      - pattern-either:
          # java.net
          - pattern: new URL($URL).openConnection(...)
          - pattern: new URL($URL).openStream(...)
          - pattern: new URI($URL)
          - pattern: (HttpURLConnection $CONN).connect()
          # java.net.http (Java 11+)
          - pattern: HttpRequest.newBuilder().uri(...)
          - pattern: HttpClient.newHttpClient().send(...)
          # Apache HttpClient
          - pattern: new HttpGet($URL)
          - pattern: new HttpPost($URL)
          - pattern: new HttpPut($URL)
          - pattern: new HttpDelete($URL)
          - pattern: new HttpHead($URL)
          - pattern: new HttpPatch($URL)
          # OkHttp
          - pattern: new Request.Builder().url($URL)
          # Spring RestTemplate / WebClient
          - pattern: (RestTemplate $RT).getForObject($URL, ...)
          - pattern: (RestTemplate $RT).getForEntity($URL, ...)
          - pattern: (RestTemplate $RT).postForObject($URL, ...)
          - pattern: (RestTemplate $RT).postForEntity($URL, ...)
          - pattern: (RestTemplate $RT).exchange($URL, ...)
          - pattern: WebClient.create($URL)
    metadata:
      cwe: ["CWE-918"]
      owasp_top_10: ["A10:2021-Server-Side Request Forgery"]
      tags: ["security", "ssrf", "taint"]

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript — taint: Express/Koa/Hapi params → HTTP sinks
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.taint.javascript
    message: >-
      Untrusted data flows into an outbound HTTP request. Enforce a strict
      URL allowlist or use a proxy with egress controls.
    languages: [javascript, typescript]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Express
          - pattern: $REQ.query[...]
          - pattern: $REQ.query.$PROP
          - pattern: $REQ.params[...]
          - pattern: $REQ.params.$PROP
          - pattern: $REQ.body[...]
          - pattern: $REQ.body.$PROP
          - pattern: $REQ.headers[...]
          # Koa
          - pattern: $CTX.query[...]
          - pattern: $CTX.query.$PROP
          - pattern: $CTX.params[...]
          - pattern: $CTX.params.$PROP
          - pattern: $CTX.request.body[...]
          # Generic
          - pattern: process.env[...]
          - pattern: process.env.$PROP
          - pattern: process.argv[...]
    pattern-sinks:
      - pattern-either:
          # fetch (Node 18+ / browser)
          - pattern: fetch($URL, ...)
          # axios
          - pattern: axios.get($URL, ...)
          - pattern: axios.post($URL, ...)
          - pattern: axios.put($URL, ...)
          - pattern: axios.delete($URL, ...)
          - pattern: axios.patch($URL, ...)
          - pattern: axios.head($URL, ...)
          - pattern: "axios.request({url: $URL, ...})"
          - pattern: axios($URL, ...)
          # node-fetch (explicit import only — $FETCH($URL) is too broad)
          # got
          - pattern: got($URL, ...)
          - pattern: got.get($URL, ...)
          - pattern: got.post($URL, ...)
          # superagent
          - pattern: superagent.get($URL)
          - pattern: superagent.post($URL)
          # Node http/https
          - pattern: http.get($URL, ...)
          - pattern: http.request($URL, ...)
          - pattern: https.get($URL, ...)
          - pattern: https.request($URL, ...)
          # undici
          - pattern: undici.fetch($URL, ...)
          - pattern: undici.request($URL, ...)
    metadata:
      cwe: ["CWE-918"]
      owasp_top_10: ["A10:2021-Server-Side Request Forgery"]
      tags: ["security", "ssrf", "taint"]

  # ---------------------------------------------------------------------------
  # Cloud metadata — all languages (pattern-only, no taint needed)
  # Matches string literals containing cloud metadata IPs/hostnames.
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.cloud-metadata
    message: >-
      Hardcoded cloud metadata endpoint. If this URL is constructed from
      user input, it is a confirmed SSRF to the instance metadata service.
    languages: [python, go, java, javascript, typescript]
    severity: HIGH
    pattern-regex: "http://(169\\.254\\.169\\.254|metadata\\.google\\.internal|100\\.100\\.100\\.200)"
    metadata:
      cwe: ["CWE-918"]
      tags: ["security", "ssrf", "cloud-metadata"]

  # ---------------------------------------------------------------------------
  # Redirect-following — detect disabled redirect guards
  # ---------------------------------------------------------------------------
  - id: raptor.web.ssrf.redirect-following.python
    message: >-
      HTTP client follows redirects by default. An SSRF via open redirect
      can bypass allowlists. Consider allow_redirects=False or a
      redirect hook that validates the target.
    languages: [python]
    severity: MEDIUM
    pattern-either:
      - pattern: requests.$FUNC($URL, ..., allow_redirects=True, ...)
      - pattern: httpx.$FUNC($URL, ..., follow_redirects=True, ...)
