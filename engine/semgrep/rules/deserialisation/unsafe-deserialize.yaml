rules:
  # ---------------------------------------------------------------------------
  # Python — pattern: always-dangerous deserialisation APIs
  # pickle/marshal/shelve are unsafe regardless of input source — the mere
  # presence of these calls on externally-reachable data is a finding.
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.python.pickle
    message: >-
      pickle.loads/load deserialises arbitrary Python objects. An attacker who
      controls the input can achieve remote code execution. Use a safe format
      (JSON, MessagePack) or sign payloads with hmac before unpickling.
    languages: [python]
    severity: CRITICAL
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
      - pattern: _pickle.loads(...)
      - pattern: cPickle.loads(...)
      - pattern: cPickle.load(...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "pickle", "rce"]

  - id: raptor.deserialisation.unsafe.python.marshal
    message: >-
      marshal.loads deserialises Python bytecode objects. Untrusted input can
      achieve code execution. Use a safe format instead.
    languages: [python]
    severity: HIGH
    pattern-either:
      - pattern: marshal.loads(...)
      - pattern: marshal.load(...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "marshal"]

  - id: raptor.deserialisation.unsafe.python.shelve
    message: >-
      shelve.open uses pickle internally. An attacker who controls the shelf
      file can achieve remote code execution.
    languages: [python]
    severity: HIGH
    pattern: shelve.open(...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "shelve", "pickle"]

  # ---------------------------------------------------------------------------
  # Python — taint: yaml.load with untrusted input (without SafeLoader)
  # yaml.load(data, Loader=SafeLoader) and yaml.safe_load() are safe.
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.python.yaml
    message: >-
      yaml.load() without SafeLoader deserialises arbitrary Python objects.
      Use yaml.safe_load() or pass Loader=SafeLoader explicitly.
    languages: [python]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Django
          - pattern: request.GET[...]
          - pattern: request.POST[...]
          - pattern: request.GET.get(...)
          - pattern: request.POST.get(...)
          - pattern: request.data[...]
          # Flask
          - pattern: flask.request.args[...]
          - pattern: flask.request.args.get(...)
          - pattern: flask.request.form[...]
          - pattern: flask.request.form.get(...)
          - pattern: flask.request.json[...]
          - pattern: flask.request.get_json(...)
          - pattern: flask.request.get_data(...)
          # Generic
          - pattern: input(...)
          - pattern: os.environ[...]
          - pattern: sys.argv[...]
          # File reads (common in deserialisation chains)
          - pattern: open(...).read()
          - pattern: $F.read()
    pattern-sinks:
      - pattern-either:
          # yaml.load without Loader kwarg — the dangerous form
          - pattern: yaml.load($X)
          # yaml.load with FullLoader or UnsafeLoader
          - pattern: yaml.load($X, Loader=yaml.FullLoader)
          - pattern: yaml.load($X, Loader=yaml.UnsafeLoader)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "yaml", "taint"]

  # ---------------------------------------------------------------------------
  # Python — pattern: yaml.load without SafeLoader (no taint needed)
  # Catches the common mistake even without a traced source.
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.python.yaml.noloader
    message: >-
      yaml.load() called without an explicit safe Loader. Use
      yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader).
    languages: [python]
    severity: HIGH
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=yaml.BaseLoader, ...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "yaml"]

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript — pattern: node-serialize (always dangerous)
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.javascript.node-serialize
    message: >-
      node-serialize unserialize() deserialises and evaluates JavaScript
      functions embedded in the input. This is a direct RCE vector. Remove
      the dependency entirely.
    languages: [javascript, typescript]
    severity: CRITICAL
    pattern-either:
      - pattern: serialize.unserialize(...)
      - pattern: $NS.unserialize(...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "node-serialize", "rce"]

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript — taint: serialize-javascript eval pattern
  # serialize-javascript outputs JS source; eval()ing untrusted input = RCE.
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.javascript.serialize-eval
    message: >-
      eval() on serialised data can execute arbitrary code. Use JSON.parse()
      for data interchange instead of eval() on serialised JavaScript.
    languages: [javascript, typescript]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Express
          - pattern: $REQ.query[...]
          - pattern: $REQ.query.$PROP
          - pattern: $REQ.params[...]
          - pattern: $REQ.params.$PROP
          - pattern: $REQ.body[...]
          - pattern: $REQ.body.$PROP
          - pattern: $REQ.headers[...]
          # Koa
          - pattern: $CTX.query[...]
          - pattern: $CTX.query.$PROP
          - pattern: $CTX.request.body[...]
          # Generic
          - pattern: process.env[...]
          - pattern: process.env.$PROP
          - pattern: process.argv[...]
    pattern-sinks:
      - pattern-either:
          - pattern: eval($X)
          - pattern: new Function($X)
          - pattern: setTimeout($X, ...)
          - pattern: setInterval($X, ...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "eval", "taint"]

  # ---------------------------------------------------------------------------
  # Go — taint: encoding/gob from network sources
  # gob itself isn't unsafe like pickle (no arbitrary code exec via type
  # registration), but it can cause panics, resource exhaustion, and logic
  # bugs when decoding attacker-controlled data. Lower severity than pickle.
  # ---------------------------------------------------------------------------
  - id: raptor.deserialisation.unsafe.go.gob
    message: >-
      encoding/gob decodes attacker-controlled data. gob is not safe for
      untrusted input — it can cause panics and resource exhaustion. Use a
      schema-validated format (protobuf, JSON with strict typing) instead.
    languages: [go]
    severity: MEDIUM
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.URL.Query().Get(...)
          - pattern: $REQ.FormValue(...)
          - pattern: $REQ.PostFormValue(...)
          - pattern: $REQ.Header.Get(...)
          - pattern: $REQ.Body
          # gin
          - pattern: $CTX.Query(...)
          - pattern: $CTX.Param(...)
          - pattern: $CTX.PostForm(...)
          # echo
          - pattern: $CTX.QueryParam(...)
          - pattern: $CTX.FormValue(...)
          # network
          - pattern: $CONN.Read(...)
          - pattern: os.Getenv(...)
    pattern-sinks:
      - pattern-either:
          - pattern: gob.NewDecoder($R).Decode(...)
          - pattern: $DEC.Decode(...)
    metadata:
      cwe: ["CWE-502"]
      owasp_top_10: ["A8:2021-Software and Data Integrity Failures"]
      tags: ["security", "deserialisation", "gob", "taint"]
