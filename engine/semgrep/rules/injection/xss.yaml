rules:
  # ---------------------------------------------------------------------------
  # Python — taint: web framework sources → unsafe HTML output sinks
  # ---------------------------------------------------------------------------
  - id: raptor.injection.xss.taint.python
    message: >-
      Untrusted data flows into an HTML response without escaping. Use
      context-aware output encoding or a templating engine with auto-escaping.
    languages: [python]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Django
          - pattern: request.GET[...]
          - pattern: request.POST[...]
          - pattern: request.GET.get(...)
          - pattern: request.POST.get(...)
          - pattern: request.data[...]
          - pattern: request.query_params[...]
          # Flask
          - pattern: flask.request.args[...]
          - pattern: flask.request.args.get(...)
          - pattern: flask.request.form[...]
          - pattern: flask.request.form.get(...)
          - pattern: flask.request.json[...]
          - pattern: flask.request.get_json(...)
          # FastAPI / Starlette
          - pattern: request.query_params[...]
          - pattern: request.path_params[...]
          # Generic
          - pattern: input(...)
          - pattern: os.environ[...]
          - pattern: os.environ.get(...)
          - pattern: sys.argv[...]
    pattern-sinks:
      - pattern-either:
          # Django mark_safe — marks string as safe HTML, bypassing auto-escape
          - pattern: mark_safe($X)
          - pattern: django.utils.safestring.mark_safe($X)
          # Jinja2 Markup — same effect as mark_safe
          - pattern: Markup($X)
          - pattern: markupsafe.Markup($X)
          # Flask render_template_string — renders user input as a Jinja2 template
          - pattern: render_template_string($X, ...)
          - pattern: flask.render_template_string($X, ...)
          # Raw HTML responses
          - pattern: Response($X, ..., content_type="text/html", ...)
          - pattern: HttpResponse($X, ..., content_type="text/html", ...)
    pattern-sanitizers:
      - pattern: html.escape(...)
      - pattern: markupsafe.escape(...)
      - pattern: bleach.clean(...)
    metadata:
      cwe: ["CWE-79"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "injection", "xss", "taint"]

  # ---------------------------------------------------------------------------
  # Go — taint: net/http handler params → unsafe HTML output sinks
  # ---------------------------------------------------------------------------
  - id: raptor.injection.xss.taint.go
    message: >-
      Untrusted data flows into an HTML response without escaping. Use
      html/template (auto-escaping) instead of text/template, or call
      template.HTMLEscapeString() before writing.
    languages: [go]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.URL.Query().Get(...)
          - pattern: $REQ.FormValue(...)
          - pattern: $REQ.PostFormValue(...)
          - pattern: $REQ.Header.Get(...)
          - pattern: $REQ.PathValue(...)
          # gin
          - pattern: $CTX.Query(...)
          - pattern: $CTX.Param(...)
          - pattern: $CTX.PostForm(...)
          # echo
          - pattern: $CTX.QueryParam(...)
          - pattern: $CTX.FormValue(...)
          # environment
          - pattern: os.Getenv(...)
          - pattern: os.Args[...]
    pattern-sinks:
      - pattern-either:
          # template type-casts — bypass html/template auto-escaping
          - pattern: template.HTML($X)
          - pattern: template.JS($X)
          - pattern: template.CSS($X)
          - pattern: template.HTMLAttr($X)
    pattern-sanitizers:
      - pattern: template.HTMLEscapeString(...)
      - pattern: html.EscapeString(...)
    metadata:
      cwe: ["CWE-79"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "injection", "xss", "taint"]

  # ---------------------------------------------------------------------------
  # Java — taint: servlet/Spring params → unsafe HTML output sinks
  # ---------------------------------------------------------------------------
  - id: raptor.injection.xss.taint.java
    message: >-
      Untrusted data flows into an HTML response without escaping. Use a
      context-aware encoder such as OWASP Java Encoder or a templating engine
      with auto-escaping.
    languages: [java]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Servlet
          - pattern: (HttpServletRequest $REQ).getParameter(...)
          - pattern: (HttpServletRequest $REQ).getHeader(...)
          - pattern: (HttpServletRequest $REQ).getPathInfo()
          - pattern: (HttpServletRequest $REQ).getQueryString()
          - pattern: (HttpServletRequest $REQ).getRequestURI()
          # Spring MVC
          - pattern: (WebRequest $REQ).getParameter(...)
          - pattern: (WebRequest $REQ).getHeader(...)
    pattern-sinks:
      - pattern-either:
          # Servlet response writer
          - pattern: (HttpServletResponse $RESP).getWriter().write($X)
          - pattern: (HttpServletResponse $RESP).getWriter().println($X)
          - pattern: (HttpServletResponse $RESP).getWriter().print($X)
          - pattern: (HttpServletResponse $RESP).getOutputStream().write(...)
          # Servlet response output
          - pattern: (PrintWriter $PW).write($X)
          - pattern: (PrintWriter $PW).println($X)
          - pattern: (PrintWriter $PW).print($X)
    pattern-sanitizers:
      - pattern: StringEscapeUtils.escapeHtml4(...)
      - pattern: HtmlUtils.htmlEscape(...)
      - pattern: Encode.forHtml(...)
      - pattern: Encode.forHtmlContent(...)
      - pattern: Encode.forHtmlAttribute(...)
    metadata:
      cwe: ["CWE-79"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "injection", "xss", "taint"]

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript — taint: Express/Koa params → unsafe HTML sinks
  # ---------------------------------------------------------------------------
  - id: raptor.injection.xss.taint.javascript
    message: >-
      Untrusted data flows into an HTML response or DOM sink without
      sanitisation. Use a context-aware encoder or DOMPurify.
    languages: [javascript, typescript]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Express
          - pattern: $REQ.query[...]
          - pattern: $REQ.query.$PROP
          - pattern: $REQ.params[...]
          - pattern: $REQ.params.$PROP
          - pattern: $REQ.body[...]
          - pattern: $REQ.body.$PROP
          - pattern: $REQ.headers[...]
          # Koa
          - pattern: $CTX.query[...]
          - pattern: $CTX.query.$PROP
          - pattern: $CTX.params[...]
          - pattern: $CTX.params.$PROP
          - pattern: $CTX.request.body[...]
          # Generic
          - pattern: process.env[...]
          - pattern: process.env.$PROP
          - pattern: process.argv[...]
    pattern-sinks:
      - pattern-either:
          # DOM sinks (client-side or SSR)
          - pattern: $EL.innerHTML = $X
          - pattern: document.write($X)
          - pattern: document.writeln($X)
          # jQuery
          - pattern: $EL.html($X)
          # React — explicit escape hatch
          - pattern: "dangerouslySetInnerHTML = {__html: $X}"
    pattern-sanitizers:
      - pattern: DOMPurify.sanitize(...)
      - pattern: xss(...)
      - pattern: sanitizeHtml(...)
    metadata:
      cwe: ["CWE-79"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "injection", "xss", "taint"]
