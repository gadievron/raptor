rules:
  # ---------------------------------------------------------------------------
  # Python — taint: web framework sources → eval/exec/compile sinks
  # CWE-95: Code Injection via eval/exec.
  #
  # NOTE: JavaScript eval() and new Function() are already covered by
  # raptor.injection.command.taint.javascript in command-taint-multi.yaml.
  # This file covers Python only to avoid duplicate findings.
  # ---------------------------------------------------------------------------
  - id: raptor.injection.eval.taint.python
    message: >-
      Untrusted data flows into eval(), exec(), or compile(). An attacker
      can execute arbitrary Python code. Use ast.literal_eval() for safe
      evaluation of literal expressions, or avoid dynamic code execution.
    languages: [python]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          # Django
          - pattern: request.GET[...]
          - pattern: request.POST[...]
          - pattern: request.GET.get(...)
          - pattern: request.POST.get(...)
          - pattern: request.data[...]
          - pattern: request.query_params[...]
          # Flask
          - pattern: flask.request.args[...]
          - pattern: flask.request.args.get(...)
          - pattern: flask.request.form[...]
          - pattern: flask.request.form.get(...)
          - pattern: flask.request.json[...]
          - pattern: flask.request.get_json(...)
          # FastAPI / Starlette
          - pattern: request.query_params[...]
          - pattern: request.path_params[...]
          # Generic
          - pattern: input(...)
          - pattern: os.environ[...]
          - pattern: os.environ.get(...)
          - pattern: sys.argv[...]
    pattern-sinks:
      - patterns:
          - pattern: eval($CODE, ...)
          - focus-metavariable: $CODE
      - patterns:
          - pattern: exec($CODE, ...)
          - focus-metavariable: $CODE
      - patterns:
          - pattern: compile($CODE, $FILENAME, $MODE, ...)
          - focus-metavariable: $CODE
    pattern-sanitizers:
      # ast.literal_eval is a safe subset — only evaluates literals
      - pattern: ast.literal_eval(...)
    metadata:
      cwe: ["CWE-95"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "injection", "code-injection", "taint"]
      cross_reference: >-
        JS eval/new Function covered by
        raptor.injection.command.taint.javascript (command-taint-multi.yaml)
