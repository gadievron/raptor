rules:
  # ---------------------------------------------------------------------------
  # Go — pattern: defer Close inside loop body — resource exhaustion
  # ---------------------------------------------------------------------------
  - id: raptor.go.defer-close-in-loop
    message: >-
      defer $X.Close() inside a loop body accumulates deferred calls until
      the enclosing function returns, causing resource exhaustion. Close
      explicitly or extract the loop body into a separate function.
    languages: [go]
    severity: WARNING
    patterns:
      - pattern: defer $X.Close()
      - pattern-inside: |
          for ... {
            ...
          }
    metadata:
      cwe: ["CWE-401"]
      tags: ["security", "go", "resource-leak"]

  # ---------------------------------------------------------------------------
  # Go — taint: web sources -> non-parameterised SQL query sinks
  # ---------------------------------------------------------------------------
  - id: raptor.go.sql-sprintf-query
    message: >-
      Untrusted data flows into a SQL query without parameterisation. Use
      db.Query(sql, args...) with positional parameters instead of
      fmt.Sprintf to build query strings.
    languages: [go]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.URL.Query().Get(...)
          - pattern: $REQ.FormValue(...)
          - pattern: $REQ.PostFormValue(...)
          - pattern: $REQ.Header.Get(...)
          - pattern: $REQ.PathValue(...)
          # gin
          - pattern: $CTX.Query(...)
          - pattern: $CTX.Param(...)
          - pattern: $CTX.PostForm(...)
          # echo
          - pattern: $CTX.QueryParam(...)
          - pattern: $CTX.FormValue(...)
          # environment
          - pattern: os.Getenv(...)
          - pattern: os.Args[...]
    pattern-sinks:
      # Single-argument calls to SQL-unique methods only.
      # Query/Exec excluded — generic names shared with non-SQL types
      # (those are caught by sql-taint.yaml's concat + SQL keyword rule).
      # pattern-not excludes string-literal $Q to prevent FPs on
      # hardcoded queries.
      - patterns:
          - pattern: $DB.QueryRow($Q)
          - pattern-not: $DB.QueryRow("...")
          - focus-metavariable: $Q
      - patterns:
          - pattern: $DB.QueryContext($CTX2, $Q)
          - pattern-not: $DB.QueryContext($CTX2, "...")
          - focus-metavariable: $Q
      - patterns:
          - pattern: $DB.QueryRowContext($CTX2, $Q)
          - pattern-not: $DB.QueryRowContext($CTX2, "...")
          - focus-metavariable: $Q
      - patterns:
          - pattern: $DB.ExecContext($CTX2, $Q)
          - pattern-not: $DB.ExecContext($CTX2, "...")
          - focus-metavariable: $Q
    metadata:
      cwe: ["CWE-89"]
      owasp_top_10: ["A3:2021-Injection"]
      tags: ["security", "go", "sqli", "taint"]

  # ---------------------------------------------------------------------------
  # Go — pattern: insecure TLS configuration
  # ---------------------------------------------------------------------------
  - id: raptor.go.insecure-tls-skip-verify
    message: >-
      InsecureSkipVerify disables TLS certificate verification, allowing
      man-in-the-middle attacks. Remove InsecureSkipVerify or set it to false.
    languages: [go]
    severity: CRITICAL
    pattern: |
      tls.Config{..., InsecureSkipVerify: true, ...}
    metadata:
      cwe: ["CWE-295"]
      owasp_top_10: ["A7:2021-Identification and Authentication Failures"]
      tags: ["security", "go", "tls"]

  - id: raptor.go.insecure-tls-min-version
    message: >-
      TLS MinVersion set to 0 allows negotiation of deprecated protocol
      versions (SSLv3, TLS 1.0, TLS 1.1). Set MinVersion to
      tls.VersionTLS12 or tls.VersionTLS13.
    languages: [go]
    severity: HIGH
    pattern: |
      tls.Config{..., MinVersion: 0, ...}
    metadata:
      cwe: ["CWE-295"]
      tags: ["security", "go", "tls"]

  # ---------------------------------------------------------------------------
  # Go — taint: web sources -> filesystem path sinks
  # ---------------------------------------------------------------------------
  - id: raptor.go.filepath-traversal
    message: >-
      Untrusted data flows into a filesystem path operation. Validate and
      sanitise the path to prevent directory traversal — filepath.Join does
      NOT prevent "../" traversal above the base directory.
    languages: [go]
    severity: CRITICAL
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.URL.Query().Get(...)
          - pattern: $REQ.FormValue(...)
          - pattern: $REQ.PostFormValue(...)
          - pattern: $REQ.Header.Get(...)
          - pattern: $REQ.PathValue(...)
          # gin
          - pattern: $CTX.Query(...)
          - pattern: $CTX.Param(...)
          - pattern: $CTX.PostForm(...)
          # echo
          - pattern: $CTX.QueryParam(...)
          - pattern: $CTX.FormValue(...)
          # environment
          - pattern: os.Getenv(...)
          - pattern: os.Args[...]
    pattern-sinks:
      - patterns:
          - pattern: os.Open($PATH)
          - focus-metavariable: $PATH
      - patterns:
          - pattern: os.ReadFile($PATH)
          - focus-metavariable: $PATH
      - patterns:
          - pattern: os.OpenFile($PATH, $FLAGS, $PERM)
          - focus-metavariable: $PATH
      - patterns:
          - pattern: ioutil.ReadFile($PATH)
          - focus-metavariable: $PATH
      - patterns:
          - pattern: filepath.Join($BASE, $PATH)
          - focus-metavariable: $PATH
    pattern-sanitizers:
      - pattern: filepath.Clean(...)
    metadata:
      cwe: ["CWE-22"]
      owasp_top_10: ["A1:2021-Broken Access Control"]
      tags: ["security", "go", "path-traversal", "taint"]
