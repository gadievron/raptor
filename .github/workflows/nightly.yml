name: Nightly (slow + integration)

# The `slow` and `integration` markers are deselected by default in
# pytest.ini (`addopts = -m "not integration and not slow"`), so these
# tests run NOWHERE in the per-PR / per-push test matrix. This workflow
# is the only place they execute in CI.
#
#   * slow        — perf baselines + sandbox-setup-heavy resolver tests
#                   (deterministic; a failure is a real regression).
#   * integration — live-network contract tests against OSV / NVD /
#                    GitHub (may flake on external outages; failures
#                    red-fail the run so they are investigated).
#
# Deliberately a standalone workflow, NOT a job in tests.yml: it must
# never ride tests.yml's `merge_group` force_full path — the merge queue
# must not block on a live-API hiccup or a multi-minute perf baseline.

on:
  schedule:
    # 07:00 UTC — on the days tests.yml's full-suite cron also fires
    # (Mon/Thu 06:00) this stays an hour clear of it; every other day
    # it runs alone.
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  VENV_PATH: .venv
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  slow-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Create venv and install deps
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Install binary-analysis toolchain (radare2 + LLVM 21)
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends radare2
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 21
          sudo apt-get install -y --no-install-recommends llvm-21 clang-21
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ \
            /usr/bin/clang++-21 100
          echo "/usr/lib/llvm-21/bin" >> "$GITHUB_PATH"
          r2 -v || true
          clang --version || true
          /usr/lib/llvm-21/bin/llvm-cov --version || true
          /usr/lib/llvm-21/bin/llvm-profdata --version || true

      - name: Run slow tests
        env:
          RAPTOR_RANDOMISE_TESTS: ${{ github.run_id }}
        run: |
          source $VENV_PATH/bin/activate
          python -m pytest -m slow core packages -q --durations=25

      - name: Run integration tests (retry once on external outage)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          source $VENV_PATH/bin/activate
          rc=0
          python -m pytest -m integration core packages --durations=25 \
            --tb=short --junitxml="$RUNNER_TEMP/integration-attempt-1.xml" \
            || rc=$?
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          echo ""
          echo "::warning::Integration tests failed (exit $rc) — retrying in 60s"
          echo ""
          sleep 60
          python -m pytest -m integration core packages --durations=25 \
            --tb=short --junitxml="$RUNNER_TEMP/integration-attempt-2.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: nightly-slow-integration-results
          path: ${{ runner.temp }}/integration-attempt-*.xml
          retention-days: 14
          if-no-files-found: ignore
