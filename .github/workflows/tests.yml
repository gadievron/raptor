name: Test Suite

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  merge_group:
  schedule:
    # Twice-weekly full-suite (force_full) run catches cross-tier
    # breakage a path filter would miss — e.g. a refactor changes an
    # API that another package's tests exercise, but the PR only
    # touched the first package's paths so the second tier was
    # skipped. PR + push-to-main are path-filtered; merge_group is the
    # only other full-unfiltered run, and only fires when something is
    # going through the merge queue. Mon+Thu keeps blind-spot latency
    # under ~3-4 days on a quiet (no-merge) stretch while halving the
    # redundant compute the old daily cron paid on active days.
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  VENV_PATH: .venv
  # CI-only hang net: dump every worker's Python stack if any single
  # test runs >120s, then let it continue (the dump is the signal, not
  # a failure). The slowest legit default-tier test is a few seconds —
  # slow/integration tests are gated out of these runs — so 120s only
  # fires on a genuine hang, surfacing the stuck call in ~2 min instead
  # of waiting out the job timeout. Set via PYTEST_ADDOPTS (not
  # pytest.ini) so it covers every tier here but NOT local `pytest`,
  # where it would dump on pdb / breakpoint sessions.
  PYTEST_ADDOPTS: "-o faulthandler_timeout=120"
  # Default-tier slow-test guard (root conftest.py). Fails the run if any
  # test's call phase exceeds this many seconds — the preventive backstop
  # for "real I/O that should be mocked" landing in the fast tier (the
  # 14s/20s/84s class the --durations sweep found). 10s is well above the
  # slowest legit default-tier test (~3s) with headroom for runner
  # variance, and well below faulthandler's 120s hang net. NOT set in
  # nightly.yml — its `-m "slow or integration"` tests are legitimately
  # slow. A genuinely-heavy new test should be marked @pytest.mark.slow.
  RAPTOR_MAX_TEST_SECONDS: "10"
  # Randomise test execution order per CI run so order-dependent
  # failures surface early. The run_id is numeric and unique, so
  # each run shuffles differently but is reproducible from the ID.
  RAPTOR_RANDOMISE_TESTS: ${{ github.run_id }}
  # Opt the runner into Node.js 24 for JavaScript actions.
  # GitHub deprecated Node.js 20 on 2025-09-19; runners enforce
  # Node 24 by default from 2026-06-02 and remove Node 20 on
  # 2026-09-16. astral-sh/setup-uv@v8.1.0 (and several others
  # pinned in this workflow) still declares ``runs.using: node20``
  # in its action.yml, so without this opt-in the runner emits a
  # deprecation warning for every JS-action step. Lift this once
  # all pinned JS actions ship a Node 24 release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  # Needed by the pre_check job to query prior workflow runs at the
  # current SHA via ``gh api repos/.../actions/runs``.
  actions: read
  # Needed by the ``changes`` job's ``gh api repos/.../pulls/.../files``
  # query to compute the changed-file list for path filtering. Covered
  # implicitly by ``contents: read`` on public repos; explicit grant
  # makes the workflow privacy-portable.
  pull-requests: read

jobs:
  # Skip the workflow if a previous successful run of this same workflow
  # already passed at the exact same commit SHA — catches the
  # "PR fast-forward-merged → main push reruns the same SHA" case and
  # explicit re-runs. Doc-only / .claude-only PRs are skipped naturally
  # by the per-job path-filter gate in `changes`, not here.
  pre_check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_skip: ${{ steps.dup.outputs.should_skip }}
      # true for same-repo events (push / merge_group / schedule / dispatch
      # / branch PRs); false only for fork PRs, whose read-only token can't
      # pull the private GHCR deps image. Tiers pass this to _tier.yml to
      # choose the image (fast) vs runner (fallback) path.
      pkg_access: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - id: dup
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          should_skip=false
          # Never dedup forced-full events: the operator triggered them
          # deliberately (cron, manual dispatch) or the merge queue needs
          # an authoritative pass.
          if [[ "$EVENT" != "schedule" && "$EVENT" != "workflow_dispatch" \
             && "$EVENT" != "merge_group" ]]; then
            # 1. Exact-SHA match — covers fast-forward merges and
            #    explicit re-runs where the SHA is identical.
            dup=$(gh api -X GET "repos/${REPO}/actions/runs" \
                    -f "head_sha=${SHA}" -f "status=success" \
                    --jq ".workflow_runs[] | select(.name==\"${WORKFLOW}\" and .id != ${RUN_ID}) | .id" \
                  | head -n1 || true)
            if [[ -n "${dup:-}" ]]; then
              should_skip=true
              echo "Skipping: prior successful run ${dup} already covered SHA ${SHA}"
            fi
            # 2. Squash-merge fallback — the push-to-main SHA is brand
            #    new, but GitHub links it to the source PR. Look up the
            #    PR's head SHA and check whether *that* already passed.
            if [[ "$should_skip" == "false" && "$EVENT" == "push" ]]; then
              pr_head=$(gh api "repos/${REPO}/commits/${SHA}/pulls" \
                          --jq '[.[] | select(.merged_at != null)][0].head.sha // empty' || true)
              if [[ -n "${pr_head:-}" ]]; then
                dup=$(gh api -X GET "repos/${REPO}/actions/runs" \
                        -f "head_sha=${pr_head}" -f "status=success" \
                        --jq ".workflow_runs[] | select(.name==\"${WORKFLOW}\" and .id != ${RUN_ID}) | .id" \
                      | head -n1 || true)
                if [[ -n "${dup:-}" ]]; then
                  should_skip=true
                  echo "Skipping: source PR head ${pr_head} already passed in run ${dup}"
                fi
              fi
            fi
          fi
          echo "should_skip=${should_skip}" >> "$GITHUB_OUTPUT"

  # Changed-file enumeration via GitHub API, then import-graph-based
  # test dispatch via test_scope.py.  CodeQL per-language filters
  # (codeql_python, codeql_cpp, codeql_actions) live in codeql.yml's
  # own changes job — this job handles test tiers only.
  #
  # The scope step always runs (even on force_full / schedule /
  # merge_group) so that downstream jobs receive file lists and
  # matrices.  Without --changed-files, test_scope.py falls back to
  # full dispatch internally — every gate is set to true and every
  # file list is populated from disk.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Per-tier gates (true/false).
      python: ${{ steps.scope.outputs.python }}
      sandbox: ${{ steps.scope.outputs.sandbox }}
      exploit_feasibility: ${{ steps.scope.outputs.exploit_feasibility }}
      prompt_audit: ${{ steps.scope.outputs.prompt_audit }}
      ci_lint: ${{ steps.scope.outputs.ci_lint }}
      codeql: ${{ steps.scope.outputs.codeql }}
      llm_analysis: ${{ steps.scope.outputs.llm_analysis }}
      cve_diff: ${{ steps.scope.outputs.cve_diff }}
      fuzzing: ${{ steps.scope.outputs.fuzzing }}
      sage: ${{ steps.scope.outputs.sage }}
      orchestration: ${{ steps.scope.outputs.orchestration }}
      zkpox: ${{ steps.scope.outputs.zkpox }}
      sca: ${{ steps.scope.outputs.sca }}
      source_intel: ${{ steps.scope.outputs.source_intel }}
      # force_full is computed by the force step and consumed by the
      # zkpox-regression job to pick the full witness corpus over the
      # PR-tier subset on schedule / merge_group / workflow_dispatch.
      force_full: ${{ steps.force.outputs.force_full }}
      # Dynamic batch matrix for the fast tier (JSON for fromJSON()).
      python_matrix: ${{ steps.scope.outputs.python_matrix }}
      # Per-tier affected file lists (space-separated paths).
      sandbox_files: ${{ steps.scope.outputs.sandbox_files }}
      exploit_feasibility_files: ${{ steps.scope.outputs.exploit_feasibility_files }}
      codeql_files: ${{ steps.scope.outputs.codeql_files }}
      llm_analysis_files: ${{ steps.scope.outputs.llm_analysis_files }}
      cve_diff_files: ${{ steps.scope.outputs.cve_diff_files }}
      fuzzing_files: ${{ steps.scope.outputs.fuzzing_files }}
      sage_files: ${{ steps.scope.outputs.sage_files }}
      orchestration_files: ${{ steps.scope.outputs.orchestration_files }}
      sca_files: ${{ steps.scope.outputs.sca_files }}
      source_intel_files: ${{ steps.scope.outputs.source_intel_files }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - id: force
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" == "schedule" || "$EVENT" == "workflow_dispatch" \
             || "$EVENT" == "merge_group" ]]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

      - id: changed_files
        if: steps.force.outputs.force_full == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          out=/tmp/changed_files.txt
          : > "$out"
          # ``--jq`` expressions use ``?`` + ``// []`` to suppress jq's
          # ``cannot iterate over: null`` error on diffs the API
          # truncates or returns as an error object:
          #   * compare API caps at 300 files; past that ``.files`` is
          #     omitted entirely (null on access).
          #   * pulls/{n}/files can return an error object (non-array)
          #     for very large PRs or transient API failures.
          # We treat "no list" the same as the first-push case: fall
          # through to compute_filters and force all filters true.
          case "$EVENT" in
            pull_request|pull_request_target)
              gh api --paginate \
                "repos/${REPO}/pulls/${PR_NUMBER}/files" \
                --jq '(. // [])[]?.filename' >> "$out"
              ;;
            push)
              if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
                # First push to a new branch — no diff base. Fall through
                # to the no-list path so compute_filters forces all true.
                rm -f "$out"
              else
                gh api --paginate \
                  "repos/${REPO}/compare/${BEFORE}...${AFTER}" \
                  --jq '(.files // [])[]?.filename' >> "$out"
              fi
              ;;
            *)
              # Other event types reach this step only if force_full was
              # false (shouldn't happen given the if: above). Treat as
              # "unknown diff" → force all filters on.
              rm -f "$out"
              ;;
          esac
          if [[ -f "$out" ]]; then
            echo "list=$out" >> "$GITHUB_OUTPUT"
            echo "Changed files ($(wc -l < "$out")):"
            cat "$out"
          fi

      # Import-graph-based test dispatch. Builds the reverse import
      # graph with stdlib ast, walks outward from changed files, and
      # maps affected test files to their CI tier. Falls back to full
      # dispatch (all gates true, all file lists populated) when no
      # changed-file list is available — covers force_full, first
      # push to a new branch, and API truncation.
      - id: scope
        run: |
          python3 .github/scripts/test_scope.py \
            ${CHANGED_FILES_LIST:+--changed-files "$CHANGED_FILES_LIST"} \
            --repo .
        env:
          CHANGED_FILES_LIST: ${{ steps.changed_files.outputs.list }}

  deps:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      (needs.changes.outputs.python == 'true' ||
       needs.changes.outputs.sandbox == 'true' ||
       needs.changes.outputs.sca == 'true' ||
       needs.changes.outputs.exploit_feasibility == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Restore venv from cache
        id: venv-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Create venv and install deps
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Verify venv exists
        run: test -d "$VENV_PATH" || (echo "venv missing at $VENV_PATH" && exit 1)

      - name: Save venv to cache
        if: steps.venv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

  # Fast tier: everything under core/ and packages/ except the two
  # heavyweight subdirs that get their own jobs (sandbox, exploit_feasibility).
  # Split 2-way via pytest-split so the slowest CI job runs in parallel.
  # No .test_durations file is committed: pytest-split falls back to random
  # distribution on first run and converges over subsequent runs. The
  # max(group1, group2) wallclock is still well below the unsplit total
  # even when unbalanced, so the saving is meaningful from day one.
  python-unit-tests-fast:
    name: python-unit-tests-fast (${{ matrix.batch }})
    needs: [pre_check, changes, deps]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Dynamic batching: test_scope.py partitions affected test files
      # into 1-8 balanced batches based on count. A single-file PR
      # gets 1 runner; a broad refactor gets up to 8.
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.python_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # actions/cache@v6.1.x does not retry 429s from the cache backend
      # (see v5.0.2 changelog: "429s returned from the cache service
      # will not be retried"); under matrix-parallel restore load some
      # jobs intermittently see "Failed to restore cache entry" even
      # when the cache exists.  Three layers of mitigation, fastest-to-
      # slowest:
      #   1. Stagger -- random 0-7s sleep spreads concurrent restores
      #      across time so the backend serialises reads instead of
      #      rate-limiting them.  Common path: this prevents the 429
      #      and attempt 1 succeeds.
      #   2. Retry with restore-keys -- 30s backoff + prefix-match
      #      fallback so a transient 429 OR an evicted exact-key
      #      both recover by reusing a slightly older venv.
      #   3. Rebuild -- install uv + ``uv pip install``.  Last-resort
      #      backstop; runs only if all restore attempts failed.
      - name: Stagger cache restore (avoid 429 thundering herd)
        run: sleep $((RANDOM % 8))

      - name: Restore venv from cache (attempt 1, exact key)
        id: cache-1
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          fail-on-cache-miss: true

      - name: Backoff before retry
        if: steps.cache-1.outcome == 'failure'
        run: sleep 30

      - name: Restore venv from cache (attempt 2, exact-or-prefix key)
        id: cache-2
        if: steps.cache-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install uv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2

      - name: Rebuild venv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Restore venv permissions
        run: chmod +x $VENV_PATH/bin/*

      - name: Cache Python bytecode
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          # __pycache__ contents are deterministic per (Python version,
          # source contents). Caching by source-tree hash recovers the
          # ~10–30s `compileall` adds per runner. Cache miss is a no-op
          # — `compileall` regenerates from scratch.
          path: |
            core/**/__pycache__
            packages/**/__pycache__
          key: pycache-${{ env.PYTHON_VERSION }}-${{ hashFiles('core/**/*.py', 'packages/**/*.py') }}
          restore-keys: |
            pycache-${{ env.PYTHON_VERSION }}-

      - name: Compile Python sources
        run: |
          source $VENV_PATH/bin/activate
          python -m compileall -q core packages *.py

      - name: Run unit tests (batch ${{ matrix.batch }})
        env:
          TEST_FILES: ${{ matrix.files }}
        run: |
          source $VENV_PATH/bin/activate
          # File list comes from test_scope.py's import-graph analysis.
          # No --ignore or --splits needed — the list is already the
          # precise set of affected test files for this batch.
          set -f  # word-split $TEST_FILES without glob expansion
          pytest -n auto $TEST_FILES

      # Note: the CLI smoke tests for raptor.py used to live at
      # test/test_cli_smoke.py with a dedicated group-1 step (to dodge
      # pytest import-name collisions with the top-level tests/ dir
      # that no longer exists). They now live at
      # core/startup/tests/test_cli_smoke.py and are collected by the
      # fast-tier `pytest core packages` step above — pytest-split
      # distributes them across groups, no dedicated step needed.

      # Note: the path-filter coverage tests at `.github/tests/` used to
      # run in this job (group 1 only). They now have their own
      # dedicated job (`ci-lint-tests`) gated on `.github/**` changes
      # so a code-only PR doesn't pay for them.

  # SCA tier: ~3,255 tests covering manifest parsers across 12 ecosystems,
  # the dep-resolver fleet, the bumper, the supply-chain detectors, and
  # the calibration substrate. The size class (≈30% of the broad ``python``
  # fast tier's collected count) is why it gets carved out — a single
  # cluster of that magnitude blew out one shard of the 4-way pytest-split
  # before this carve-out. Internally 4-way split (same shape as fast tier).
  python-unit-tests-sca:
    needs: [pre_check, changes, deps]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.sca == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # actions/cache@v6.1.x does not retry 429s from the cache backend
      # (see v5.0.2 changelog: "429s returned from the cache service
      # will not be retried"); under matrix-parallel restore load some
      # jobs intermittently see "Failed to restore cache entry" even
      # when the cache exists.  Three layers of mitigation, fastest-to-
      # slowest:
      #   1. Stagger -- random 0-7s sleep spreads concurrent restores
      #      across time so the backend serialises reads instead of
      #      rate-limiting them.  Common path: this prevents the 429
      #      and attempt 1 succeeds.
      #   2. Retry with restore-keys -- 30s backoff + prefix-match
      #      fallback so a transient 429 OR an evicted exact-key
      #      both recover by reusing a slightly older venv.
      #   3. Rebuild -- install uv + ``uv pip install``.  Last-resort
      #      backstop; runs only if all restore attempts failed.
      - name: Stagger cache restore (avoid 429 thundering herd)
        run: sleep $((RANDOM % 8))

      - name: Restore venv from cache (attempt 1, exact key)
        id: cache-1
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          fail-on-cache-miss: true

      - name: Backoff before retry
        if: steps.cache-1.outcome == 'failure'
        run: sleep 30

      - name: Restore venv from cache (attempt 2, exact-or-prefix key)
        id: cache-2
        if: steps.cache-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install uv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2

      - name: Rebuild venv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Restore venv permissions
        run: chmod +x $VENV_PATH/bin/*

      - name: Run SCA tests (group ${{ matrix.group }} of 4)
        env:
          SCA_FILES: ${{ needs.changes.outputs.sca_files }}
        run: |
          source $VENV_PATH/bin/activate
          set -f  # word-split $SCA_FILES without glob expansion
          rc=0
          python -m pytest -n auto --splits 4 --group ${{ matrix.group }} \
            --durations-path packages/sca/test-durations.json $SCA_FILES \
            || rc=$?
          # Exit 5 = "no tests collected" — legitimate when path filtering
          # narrows SCA_FILES to fewer files than split groups.
          if [ "$rc" -eq 5 ]; then exit 0; fi
          exit "$rc"

  # Sandbox tier: ~251 heavyweight tests doing real namespace/mount/seccomp
  # work. Gated on sandbox-related path changes only.
  python-unit-tests-sandbox:
    needs: [pre_check, changes, deps]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.sandbox == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # actions/cache@v6.1.x does not retry 429s from the cache backend
      # (see v5.0.2 changelog: "429s returned from the cache service
      # will not be retried"); under matrix-parallel restore load some
      # jobs intermittently see "Failed to restore cache entry" even
      # when the cache exists.  Three layers of mitigation, fastest-to-
      # slowest:
      #   1. Stagger -- random 0-7s sleep spreads concurrent restores
      #      across time so the backend serialises reads instead of
      #      rate-limiting them.  Common path: this prevents the 429
      #      and attempt 1 succeeds.
      #   2. Retry with restore-keys -- 30s backoff + prefix-match
      #      fallback so a transient 429 OR an evicted exact-key
      #      both recover by reusing a slightly older venv.
      #   3. Rebuild -- install uv + ``uv pip install``.  Last-resort
      #      backstop; runs only if all restore attempts failed.
      - name: Stagger cache restore (avoid 429 thundering herd)
        run: sleep $((RANDOM % 8))

      - name: Restore venv from cache (attempt 1, exact key)
        id: cache-1
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          fail-on-cache-miss: true

      - name: Backoff before retry
        if: steps.cache-1.outcome == 'failure'
        run: sleep 30

      - name: Restore venv from cache (attempt 2, exact-or-prefix key)
        id: cache-2
        if: steps.cache-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install uv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2

      - name: Rebuild venv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Restore venv permissions
        run: chmod +x $VENV_PATH/bin/*

      - name: Run sandbox tests
        run: |
          source $VENV_PATH/bin/activate
          # `python -m pytest` (rather than bare `pytest`) puts the repo
          # root on sys.path so `from core.security.redaction import ...`
          # in sandbox sources resolves. Bare pytest only works when
          # `core` is included in the args (e.g. `pytest core packages`).
          set -f
          python -m pytest $SANDBOX_FILES
        env:
          SANDBOX_FILES: ${{ needs.changes.outputs.sandbox_files }}

  # macOS sandbox tier: runs the same core/sandbox/tests on a real Darwin
  # host so the darwin_only enforcement tests (sandbox-exec write-blocking,
  # network-blocking, audit JSONL, Seatbelt profile enforcement) actually
  # execute. The Linux sandbox job above only runs the cross-platform
  # subset; the skipif(sys.platform != "darwin") tests are invisible there.
  # Free on public repos — no runner-minute cost.
  python-unit-tests-sandbox-macos:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.sandbox == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Restore venv from cache
        id: venv-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Create venv and install deps
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Save venv to cache
        if: steps.venv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Run sandbox tests (macOS)
        env:
          SANDBOX_FILES: ${{ needs.changes.outputs.sandbox_files }}
        run: |
          source $VENV_PATH/bin/activate
          set -f
          python -m pytest $SANDBOX_FILES -v

  # Exploit-feasibility integration tier: 11 × ~15 s tests calling
  # analyze_binary against real binaries. Gated on the package's real
  # upstream dependency surface.
  python-unit-tests-exploit-feasibility:
    needs: [pre_check, changes, deps]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.exploit_feasibility == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # actions/cache@v6.1.x does not retry 429s from the cache backend
      # (see v5.0.2 changelog: "429s returned from the cache service
      # will not be retried"); under matrix-parallel restore load some
      # jobs intermittently see "Failed to restore cache entry" even
      # when the cache exists.  Three layers of mitigation, fastest-to-
      # slowest:
      #   1. Stagger -- random 0-7s sleep spreads concurrent restores
      #      across time so the backend serialises reads instead of
      #      rate-limiting them.  Common path: this prevents the 429
      #      and attempt 1 succeeds.
      #   2. Retry with restore-keys -- 30s backoff + prefix-match
      #      fallback so a transient 429 OR an evicted exact-key
      #      both recover by reusing a slightly older venv.
      #   3. Rebuild -- install uv + ``uv pip install``.  Last-resort
      #      backstop; runs only if all restore attempts failed.
      - name: Stagger cache restore (avoid 429 thundering herd)
        run: sleep $((RANDOM % 8))

      - name: Restore venv from cache (attempt 1, exact key)
        id: cache-1
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          fail-on-cache-miss: true

      - name: Backoff before retry
        if: steps.cache-1.outcome == 'failure'
        run: sleep 30

      - name: Restore venv from cache (attempt 2, exact-or-prefix key)
        id: cache-2
        if: steps.cache-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # was v6.1.0
        with:
          path: ${{ env.VENV_PATH }}
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install uv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # was v8.3.2

      - name: Rebuild venv (rebuild fallback when both restore attempts failed)
        if: steps.cache-1.outcome == 'failure' && steps.cache-2.outputs.cache-matched-key == ''
        run: |
          uv venv $VENV_PATH
          source $VENV_PATH/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Restore venv permissions
        run: chmod +x $VENV_PATH/bin/*

      - name: Run exploit_feasibility integration tests
        env:
          EXPLOIT_FILES: ${{ needs.changes.outputs.exploit_feasibility_files }}
        run: |
          source $VENV_PATH/bin/activate
          set -f
          python -m pytest $EXPLOIT_FILES

  # source_intel tier: Coccinelle-driven memory-corruption evidence.
  # The real-spatch E2E (test_e2e_real_spatch_* etc.) are
  # `skipif(not shutil.which("spatch"))`, and the broad ``python`` fast
  # tier installs no spatch — so before this job they NEVER ran in CI.
  # The CI deps image bakes in coccinelle so the container path gets
  # real spatch coverage; the runner fallback (fork PRs) skips those
  # tests via the skipif guard.
  #
  # Known: when a PR that changes the Dockerfile merges, ci-deps-image.yml
  # and tests.yml fire concurrently — tests pull the old image (no new
  # packages yet). The skipif guards degrade gracefully; the next push
  # uses the rebuilt image. One-time per Dockerfile change, self-healing.
  python-unit-tests-source-intel:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.source_intel == 'true'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_tier.yml
    with:
      tier: source_intel
      test_path: ${{ needs.changes.outputs.source_intel_files }}
      pytest_args: ""
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  # Prompt-envelope audit: AST-based heuristic over the registered
  # prompt-construction files. The test only needs stdlib + pytest
  # (no project deps), so it skips the venv artefact entirely and
  # installs pytest standalone. Gated on the narrow ``prompt_audit``
  # filter so it only fires when an audited file, the audit module,
  # or the test itself actually changes.
  python-prompt-audit:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.prompt_audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: pip install pytest==9.0.3

      - name: Run prompt-envelope audit
        run: |
          # `python -m pytest` so `from core.security...` resolves
          # without needing the repo on PYTHONPATH.
          python -m pytest core/security/tests/test_prompt_envelope_audit.py -q

  # CI lint / filter-coverage tests. Validates that compute_filters.py's
  # globs cover the actual import dependencies of subsystem-scoped jobs.
  # No project deps required — only pytest.
  ci-lint-tests:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.ci_lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # was v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: pip install pytest==9.0.3

      - name: Run CI filter-coverage tests
        run: pytest .github/tests

  # Heavy-subdir Python tiers — each gated on its own filter so a PR
  # touching only one package skips the others. Filters live in
  # compute_filters.FILTERS and are validated by ci-lint-tests above.
  python-unit-tests-codeql:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.codeql == 'true'
    permissions:
      contents: read
      packages: read              # pull the private GHCR deps image (image path)
    uses: ./.github/workflows/_tier.yml
    with:
      tier: codeql
      test_path: ${{ needs.changes.outputs.codeql_files }}
      timeout_minutes: 25
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  python-unit-tests-llm-analysis:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.llm_analysis == 'true'
    permissions:
      contents: read
      packages: read              # pull the private GHCR deps image (image path)
    uses: ./.github/workflows/_tier.yml
    with:
      tier: llm_analysis
      test_path: ${{ needs.changes.outputs.llm_analysis_files }}
      timeout_minutes: 25
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  python-unit-tests-cve-diff:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.cve_diff == 'true'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_tier.yml
    with:
      tier: cve_diff
      test_path: ${{ needs.changes.outputs.cve_diff_files }}
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  python-unit-tests-fuzzing:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.fuzzing == 'true'
    permissions:
      contents: read
      packages: read              # pull the private GHCR deps image (image path)
    uses: ./.github/workflows/_tier.yml
    with:
      tier: fuzzing
      test_path: ${{ needs.changes.outputs.fuzzing_files }}
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  # CANARY for the prebuilt-image migration (phase 2 of the fan-out
  # fix). sage is the proving ground: zero subprocess usage in
  # core/sage/tests, so if this goes green the container approach is
  # sound and the remaining pure-Python tiers can follow. It runs
  # INSIDE ghcr.io/<owner>/raptor-ci-deps (deps baked in) instead of
  # `needs: deps` + downloading the venv artifact — removing one
  # venv-download from the fan-out that queues under a runner cap.
  # sandbox (namespaces) + exploit_feasibility (radare2/gcc) will NOT
  # migrate; the slim image can't host them.
  # CANARY for the reusable-workflow migration. sage proves the _tier.yml
  # two-path (image / runner-fallback) shape before the other container
  # tiers (codeql, llm-analysis, fuzzing, orchestration) follow. The
  # caller keeps its path-filter `if:` and name; _tier.yml picks the
  # execution path from pkg_access.
  python-unit-tests-sage:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.sage == 'true'
    permissions:
      contents: read
      packages: read              # pull the private GHCR deps image (image path)
    uses: ./.github/workflows/_tier.yml
    with:
      tier: sage
      test_path: ${{ needs.changes.outputs.sage_files }}
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  python-unit-tests-orchestration:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      needs.changes.outputs.orchestration == 'true'
    permissions:
      contents: read
      packages: read              # pull the private GHCR deps image (image path)
    uses: ./.github/workflows/_tier.yml
    with:
      tier: orchestration
      test_path: ${{ needs.changes.outputs.orchestration_files }}
      use_container: ${{ needs.pre_check.outputs.pkg_access == 'true' }}

  # Single aggregate gate over the whole suite. `needs:` every job and
  # `if: always()` so it still runs when an upstream tier is path-filtered
  # out (skipped) or fails. This is the one check to pin in a future
  # branch-protection ruleset: individual tier job names can then change
  # — notably the reusable-workflow `/ python-<tier>` rename — without
  # touching protection. Skipped is a pass (dedup / path-filter); only
  # failure or cancellation blocks.
  tests-passed:
    name: tests-passed
    if: always()
    needs:
      - pre_check
      - changes
      - deps
      - python-unit-tests-fast
      - python-unit-tests-sca
      - python-unit-tests-sandbox
      - python-unit-tests-sandbox-macos
      - python-unit-tests-exploit-feasibility
      - python-prompt-audit
      - ci-lint-tests
      - python-unit-tests-codeql
      - python-unit-tests-llm-analysis
      - python-unit-tests-cve-diff
      - python-unit-tests-source-intel
      - python-unit-tests-fuzzing
      - python-unit-tests-sage
      - python-unit-tests-orchestration
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all tiers passed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          echo "Tier results: ${RESULTS}"
          ok=1
          for r in ${RESULTS}; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::A required tier reported '${r}'"; ok=0 ;;
            esac
          done
          [ "$ok" -eq 1 ] || exit 1
          echo "All tiers passed or were legitimately skipped."

  # ZKPoX regression: build the SP1 guest + host prover, regenerate
  # the witness corpus, and run the execute-mode sweep through every
  # witness in core/zkpox/test/witnesses/. Catches the kind of
  # breakage that only surfaces when the real SP1 cross-compile +
  # gadget primitive actually run on a witness (e.g., a "crash"
  # witness whose bytes interact with strcat semantics in a way the
  # bug doesn't fire on).
  #
  # Scope: execute mode only. --prove --wrap=core is ~17 s/witness
  # warm × 40 witnesses ≈ 11 min just for proves; --wrap=groth16
  # is ~17 min/witness plus a one-time 6.2 GB circuit-artifact
  # download. Either belongs on the schedule/nightly tier, not a
  # PR gate. See docs/research/zkpox-phase0-findings.md.
  #
  # Wall-clock budget: sequential sweep, 4-witness PR-tier subset
  # (~6 min sweep + 2 min build + ~1 min setup ≈ 9 min total job).
  # Parallel sweep was attempted (ac14b53, fbec21b) and reverted — 4
  # concurrent SP1 invocations OOM'd the runner's cgroup. Cold-cache
  # builds still consume ~20 min so the 25-min timeout is the binding
  # ceiling — keep PR-tier under that on a warm SP1 cache. The full
  # 40-witness corpus runs on schedule / merge_group / workflow_dispatch
  # (force_full=true) where wall-clock isn't capped the same way.
  zkpox-regression:
    needs: [pre_check, changes]
    if: |
      needs.pre_check.outputs.should_skip != 'true' &&
      (needs.changes.outputs.force_full == 'true' ||
       needs.changes.outputs.zkpox == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang + lld + llvm + protoc + go
        # clang/lld/llvm provide the RISC-V backend for guest C
        # cross-compile (build.rs's `clang --target=riscv64-...`).
        # protobuf-compiler is needed by sp1-prover-types' build.rs.
        # golang-go is a transitive build-time dep via
        # sp1-recursion-gnark-ffi (pulled even in execute-only flows);
        # see docs/research/zkpox-phase0-findings.md "Issues discovered"
        # row 1.
        run: sudo apt-get update && sudo apt-get install -y clang lld llvm protobuf-compiler golang-go jq

      - name: Cache SP1 toolchain + cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.sp1
            ~/.cargo/registry
            ~/.cargo/git
            core/zkpox/target
          key: zkpox-${{ runner.os }}-${{ hashFiles('core/zkpox/Cargo.lock') }}
          restore-keys: |
            zkpox-${{ runner.os }}-

      - name: Install SP1 (sp1up)
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"
          "$HOME/.sp1/bin/sp1up"

      - name: Build zkpox-prove (workspace bin used by the sweep)
        # Build only `zkpox-prove`; the regression sweep does not
        # exercise `zkpox-verify`, so skipping it shaves ~30-60 s of
        # cold-cache compile (the SP1 dependency surface is the same
        # for both binaries, but linking each one isn't free). The
        # `python-unit-tests-fast` tier covers `packages/zkpox/`'s
        # Python verifier wrapper; a zkpox-verify-only regression
        # job is a follow-up if it ever needs first-class CI.
        #
        # sp1-build v6.1.0 emits two unconditional `cargo:warning=`
        # info-notices on every build — the succinct rustc version and
        # the guest's build timestamp. They are not actionable warnings
        # (the upstream maintainers just chose `cargo:warning=` as the
        # only build-script channel cargo surfaces to the user). Strip
        # only those exact signatures so real warnings still show.
        run: |
          cargo build --release --bin zkpox-prove --manifest-path core/zkpox/Cargo.toml 2>&1 \
            | awk '!/^warning: zkpox-prover@[0-9.]+: (rustc \+succinct --version:|zkpox-guest built at )/'

      - name: Regenerate witness corpus
        run: python3 core/zkpox/test/witnesses/generate.py

      - name: Regression sweep (execute mode)
        # PR-tier runs the --ci-subset (4 witnesses, ~6 min sweep).
        # schedule / workflow_dispatch / merge_group sets force_full
        # and runs the full 40-witness corpus (~10 min sweep). The
        # 25-min timeout is the binding constraint; the build alone
        # is ~20 min on cold cache, so PR-tier has to keep the sweep
        # short. See the curated list + rationale in
        # core/zkpox/test/run-tests.sh.
        run: |
          if [[ "${{ needs.changes.outputs.force_full }}" == "true" ]]; then
            bash core/zkpox/test/run-tests.sh
          else
            bash core/zkpox/test/run-tests.sh --ci-subset
          fi

      - name: zkpox-verify feature-gate smoke (Phase 1.5.2 §6/§7)
        # Build the verifier under both feature configurations:
        #   --features structural             — no sp1-sdk; fast tier shape.
        #   --features full-verify (default)  — embeds the guest ELF,
        #                                       links sp1-sdk verify path.
        # Most of the dependency surface is already warm from the
        # zkpox-prove build above (same workspace), so adding both
        # builds here costs roughly the link step. ``--help`` smoke-
        # tests the CLI entry point in each shape; a real prove →
        # verify E2E lives in test_full_verify_e2e.py (slow tier).
        #
        # Same awk filter as the prover build to suppress the
        # sp1-build cargo:warning info-notices.
        run: |
          bash core/zkpox/test/build-verifier-both-features.sh 2>&1 \
            | awk '!/^warning: zkpox-(prover|verify)@[0-9.]+: (rustc \+succinct --version:|zkpox-guest built at )/'

