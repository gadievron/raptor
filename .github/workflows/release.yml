name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${TAG}' does not match vX.Y.Z format"
            exit 1
          fi
          if ! git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "::warning::Tagged commit is not on main — verify this is intentional"
          fi

      - name: Generate changelog
        id: changelog
        env:
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | awk -v tag="${TAG}" '$0 == tag {exit} {last=$0} END {print last}')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            echo "Comparing ${PREV_TAG}..${TAG}"
            COMMITS=$(git log --pretty=format:"%s" "${PREV_TAG}..HEAD")
          fi

          FEATURES=$(echo "$COMMITS" | grep -iE '^feat(\(.+\))?:' | sed -E 's/^[^:]+:[[:space:]]*/- /' || true)
          FIXES=$(echo "$COMMITS" | grep -iE '^fix(\(.+\))?:' | sed -E 's/^[^:]+:[[:space:]]*/- /' || true)
          SECURITY=$(echo "$COMMITS" | grep -iE '^(security|sec)(\(.+\))?:' | sed -E 's/^[^:]+:[[:space:]]*/- /' || true)
          DOCS=$(echo "$COMMITS" | grep -iE '^docs(\(.+\))?:' | sed -E 's/^[^:]+:[[:space:]]*/- /' || true)
          OTHER=$(echo "$COMMITS" | grep -ivE '^(feat|fix|security|sec|docs|release|chore|ci|test|build|style)(\(.+\))?:' | sed 's/^/- /' || true)

          CHANGELOG="## What's changed in ${TAG}"
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG="${CHANGELOG} (since ${PREV_TAG})"
          fi
          CHANGELOG="${CHANGELOG}

          "

          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}### New features
          ${FEATURES}

          "
          [ -n "$SECURITY" ] && CHANGELOG="${CHANGELOG}### Security
          ${SECURITY}

          "
          [ -n "$FIXES" ] && CHANGELOG="${CHANGELOG}### Bug fixes
          ${FIXES}

          "
          [ -n "$DOCS" ] && CHANGELOG="${CHANGELOG}### Docs
          ${DOCS}

          "
          [ -n "$OTHER" ] && CHANGELOG="${CHANGELOG}### Other changes
          ${OTHER}

          "

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG="${CHANGELOG}**Full diff:** https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          fi

          echo "$CHANGELOG" > /tmp/changelog.md
          cat /tmp/changelog.md
          echo "file=/tmp/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Stamp release version
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          python3 -c "
          import sys, re
          tag = sys.argv[1]
          ver = tag.lstrip('v')

          # raptor-offset banner
          text = open('raptor-offset').read()
          def replace_banner(m):
              prefix = m.group(1)
              content = prefix + tag
              pad = 76 - len(content)
              return content + ' ' * pad + '║'
          text = re.sub(r'(║\s+Based on Claude Code - )\S+[^║]*║', replace_banner, text)
          open('raptor-offset', 'w').write(text)

          # core/config.py VERSION
          text = open('core/config.py').read()
          text = re.sub(
              r'^(\s+VERSION = \")[^\"]+(\")' ,
              lambda m: m.group(1) + ver + m.group(2),
              text, count=1, flags=re.MULTILINE)
          open('core/config.py', 'w').write(text)

          # README.md banner — 'Based on Claude Code (vX.Y.Z)' inside box
          text = open('README.md').read()
          def replace_readme(m):
              prefix = m.group(1)
              content = prefix + tag + ')'
              pad = 76 - len(content)
              return content + ' ' * pad + '║'
          text = re.sub(r'(║\s+Based on Claude Code \()[^)]+\)[^║]*║', replace_readme, text)
          open('README.md', 'w').write(text)
          " "$TAG"
          echo "Stamped:"
          grep "Based on Claude Code" raptor-offset
          grep 'VERSION = ' core/config.py | head -1
          grep "Based on Claude Code" README.md

      - name: Commit version stamp and update tag
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raptor-offset core/config.py README.md
          if ! git diff --cached --quiet; then
            git commit -m "release: stamp ${TAG}"
            git tag -a -f "${TAG}" -m "Release ${TAG}"
            git push --force origin "refs/tags/${TAG}"
          fi

      - name: Build release archives
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          NAME="raptor-${TAG}"

          git archive --format=tar --prefix="${NAME}/" HEAD | tar -x -C /tmp

          cd /tmp
          zip -r "${NAME}.zip" "${NAME}" -x "*.DS_Store"
          tar -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.zip" "${NAME}.tar.gz" > "${NAME}-checksums.txt"

          echo "Archives built:"
          ls -lh /tmp/${NAME}.*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          NAME="raptor-${TAG}"

          gh release delete "${TAG}" --yes 2>/dev/null || true

          gh release create "${TAG}" \
            --verify-tag \
            --title "RAPTOR ${TAG}" \
            --notes-file /tmp/changelog.md \
            /tmp/${NAME}.zip \
            /tmp/${NAME}.tar.gz \
            /tmp/${NAME}-checksums.txt
